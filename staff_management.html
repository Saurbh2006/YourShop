<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management | YourShop</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="side-logo-container" style="text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px;">
                <div class="side-logo" style="font-size: 1.6rem; font-weight: 700; color: #4834d4;">
                    Your<span>Shop</span>
                </div>
                <div id="globalShopName" style="font-size: 0.8rem; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;">
                    Loading Shop...
                </div>
            </div>
            
            <nav>
                <a href="admin_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="inventory.html"><i class="fas fa-box"></i> Inventory</a>
                <a href="transactions.html"><i class="fas fa-shopping-cart"></i> Transactions</a>
                <a href="staff_management.html"><i class="fas fa-users"></i> Staff Management</a>
                <a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="billing.html"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
                <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="date-section">
                    <i class="fas fa-user-tie" style="color: #4834d4;"></i>
                    <span style="font-weight: 600; margin-left: 10px;">Manage Staff Members</span>
                </div>
                <button class="add-btn" onclick="openStaffModal()">+ Add New Staff</button>
            </header>

            <section class="data-section-zen">
                <div class="table-container-glass">
                    <table>
                        <thead>
                            <tr>
                                <th>Staff ID</th>
                                <th>Full Name</th>
                                <th>Email/Username</th>
                                <th>Role</th>
                                <th>Join Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="staffModal" class="modal-overlay" style="display: none;">
        <div class="modal-content-zen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Register New Staff</h3>
                <button onclick="closeStaffModal()" style="background:none; border:none; font-size: 20px; cursor:pointer;">&times;</button>
            </div>
            <form id="addStaffForm">
                <input type="text" id="staffName" placeholder="Full Name" required>
                <input type="email" id="staffEmail" placeholder="Email Address" required>
                <input type="text" id="staffId" placeholder="Staff ID (Username)" required>
                <input type="password" id="staffPassword" placeholder="Password" required>
                <button type="submit" class="save-btn">Create Staff</button>
            </form>
        </div>
    </div>

    <div id="resetPassModal" class="modal-overlay" style="display: none;">
        <div class="modal-content-zen" style="max-width: 350px;">
            <h3>Modify Staff Password</h3>
            <p id="resettingFor" style="font-size: 0.8rem; color: #666; margin-bottom: 15px;"></p>
            <form id="resetStaffPassForm">
                <input type="hidden" id="resetTargetId">
                <input type="password" id="newStaffPassword" placeholder="Enter New Password" required 
                       style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;">
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="save-btn" style="flex: 2;">Update Password</button>
                    <button type="button" onclick="closeResetModal()" class="add-btn" style="flex: 1; background: #636e72;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../JS/staff_logic.js"></script>
    <script>
        // Modal UI Helpers
        function openStaffModal() { document.getElementById('staffModal').style.display = 'flex'; }
        function closeStaffModal() { document.getElementById('staffModal').style.display = 'none'; }
        function closeResetModal() { 
            document.getElementById('resetPassModal').style.display = 'none'; 
            document.getElementById('resetStaffPassForm').reset();
        }
    </script>
</body>
</html>
