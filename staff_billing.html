<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing | YourShop</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>

    <div class="dashboard-wrapper">
       <aside class="sidebar">
    <div class="side-logo-container" style="text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px;">
        <div class="side-logo" style="font-size: 1.6rem; font-weight: 700; color: #4834d4;">
            Your<span style="color: #686de0;">Shop</span>
        </div>
        <div id="globalShopName" style="font-size: 0.8rem; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;">
            Loading Shop...
        </div>
    </div>
    
    <nav>
                <a href="staff_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="staff_inventory.html"><i class="fas fa-box"></i> Inventory</a>
                <a href="staff_billing.html"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
                <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
</aside>


           <main class="main-content">
            <header class="top-bar">
                <div class="date-section">
                    <i class="fas fa-file-invoice" style="color: #4834d4;"></i>
                    <span class="session-title">New Billing Session</span>
                </div>
                <div id="displayDate" class="date-text"></div>
            </header>

            <div class="billing-container">
                <div class="billing-form-glass">
                    <div class="section-title">
                        <h3><i class="fas fa-receipt"></i> Billing Details</h3>
                        <p>Customer info and product search</p>
                    </div>

                    <div class="customer-info-row">
                        <div class="input-group-zen">
                            <label><i class="fas fa-user"></i> Customer Name</label>
                            <input type="text" id="custName" placeholder="Full Name">
                        </div>
                        <div class="input-group-zen">
                            <label><i class="fas fa-phone"></i> Contact Number</label>
                            <input type="tel" id="custPhone" placeholder="10-digit Mobile">
                        </div>
                    </div>

                    <div class="input-group-zen search-section">
                        <input type="text" id="itemSearch" placeholder="Search product name..." autocomplete="off">
                        <div id="suggestionBox" class="suggestion-box"></div>
                    </div>

                    <div class="billing-inputs">
                        <div class="input-group-zen qty-input">
                            <label>Quantity</label>
                            <input type="number" id="itemQty" value="1" min="1">
                        </div>
                        <button class="add-to-cart-btn" onclick="addItemToBill()">
                            <i class="fas fa-cart-plus"></i> Add to Bill
                        </button>
                    </div>
                </div>

                <div class="invoice-glass">
                    <div class="invoice-header">
                        <h3>Invoice Summary</h3>
                        <span id="invoiceNumber">#INV-LOAD...</span>
                    </div>
                    
                    <div class="bill-table-wrapper">
                        <table id="billTable">
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Price</th>
                                    <th>Qty</th>
                                    <th>Total</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="billItemsBody"></tbody>
                        </table>
                    </div>

                    <div class="bill-summary-footer">
                        <div class="payment-selection">
                            <span class="payment-label">Payment Method:</span>
                            <div class="pay-options-wrapper">
                                <label class="pay-option">
                                    <input type="radio" name="payMethod" value="Cash" checked>
                                    <span><i class="fas fa-money-bill-wave"></i> Cash</span>
                                </label>
                                <label class="pay-option">
                                    <input type="radio" name="payMethod" value="UPI">
                                    <span><i class="fas fa-mobile-alt"></i> UPI</span>
                                </label>
                                <label class="pay-option">
                                    <input type="radio" name="payMethod" value="Card">
                                    <span><i class="fas fa-credit-card"></i> Card</span>
                                </label>
                            </div>
                        </div>

                        <div class="summary-row">
                            <span class="label">Sub Total:</span>
                            <span id="subTotal">₹ 0.00</span>
                        </div>
                        <div class="summary-row grand-total-row">
                            <span class="label">Grand Total:</span>
                            <span id="grandTotal">₹ 0.00</span>
                        </div>

                        <div id="postCheckoutActions" class="post-actions">
                            <button class="action-btn print-btn-blue" onclick="printBill()">
                                <i class="fas fa-print"></i> Print Bill
                            </button>
                            <button class="action-btn new-bill-btn" onclick="window.location.reload()">
                                <i class="fas fa-plus"></i> New Bill
                            </button>
                        </div>

                        <button id="checkoutBtn" class="main-checkout-btn" onclick="processBill()">
                            <i class="fas fa-check-circle"></i> Checkout & Save
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../JS/billing_logic.js"></script>
    <script>
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-IN', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        // Set a random temp invoice number on load
        document.getElementById('invoiceNumber').innerText = "#INV-" + Math.floor(100000 + Math.random() * 900000);
    </script>
</body>
</html>
