<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | YourShop</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
    <div class="side-logo-container" style="text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px;">
        <div class="side-logo" style="font-size: 1.6rem; font-weight: 700; color: #4834d4;">
            Your<span style="color: #686de0;">Shop</span>
        </div>
        <div id="globalShopName" style="font-size: 0.8rem; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;">
            Loading Shop...
        </div>
    </div>
    
    <nav>
                <a href="staff_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="staff_inventory.html"><i class="fas fa-box"></i> Inventory</a>
                <a href="staff_billing.html"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
                <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
</aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box-zen">
    <i class="fas fa-search"></i>
    <input type="text" id="inventorySearch" placeholder="Search by SKU or Name...">
</div>
                <button class="add-btn" onclick="openModal()">
                    <i class="fas fa-plus"></i> Add New Product
                </button>
            </header>

            <section class="data-section-zen">
                <div class="table-container-glass">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price (₹)</th>
                                <th>Stock Qty</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="productModal" class="modal-overlay">
    <div class="modal-content-zen">
        <h3 id="modalTitle">Add New Product</h3> <form id="addProductForm">
            <input type="hidden" id="editProductId"> <input type="text" id="pName" placeholder="Product Name" required>
            <input type="text" id="pCategory" placeholder="Category" required>
            <input type="number" id="pPrice" placeholder="Price (₹)" required>
            <input type="number" id="pStock" placeholder="Initial Stock Quantity" required>
            <div class="modal-btns">
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button type="submit" id="saveBtn" class="submit-btn-zen">Save Product</button>
            </div>
        </form>
    </div>
</div>

    <script src="../JS/inventory.js"></script>
    <script>
        function openModal() { document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
