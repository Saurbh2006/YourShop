<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | YourShop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
     <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        .reset-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .step-box { display: none; }
        .step-box.active { display: block; }
        .back-link { display: block; margin-top: 20px; color: #4834d4; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="reset-container">
    <div class="icon-box">🔑</div>
    <h2>Account Recovery</h2>
    <p>Enter your details step by step to secure your shop again.</p>

    <div id="box1" class="step-box active">
        <input type="text" id="resUserId" class="reset-input" placeholder="Admin/Staff ID">
        <button onclick="changeStep(2)" class="action-btn">Next Step</button>
    </div>

    <div id="box2" class="step-box">
        <input type="email" id="resEmail" class="reset-input" placeholder="Shop Email Address">
        <button onclick="changeStep(3)" class="action-btn">Verify Email</button>
    </div>

    <div id="box3" class="step-box">
        <input type="password" id="resNewPass" class="reset-input" placeholder="Enter New Password">
        <button onclick="finalSubmitReset()" class="action-btn">Update Password</button>
    </div>

    <a href="index.html" class="back-link">← Back to Login</a>
</div>

    <script>
        function changeStep(step) {
            document.querySelectorAll('.step-box').forEach(el => el.classList.remove('active'));
            document.getElementById('box' + step).classList.add('active');
        }

        async function finalSubmitReset() {
            const userId = document.getElementById('resUserId').value;
            const shopEmail = document.getElementById('resEmail').value;
            const newPassword = document.getElementById('resNewPass').value;

            try {
                const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, shopEmail, newPassword })
                });
                const data = await res.json();
                if(data.success) {
                    alert("✅ Success! Your password has been updated.");
                    window.location.href = "index.html";
                } else {
                    alert("❌ Error: " + data.message);
                }
            } catch (err) {
                alert("Server Error!");
            }
        }
    </script>
</body>
</html>
