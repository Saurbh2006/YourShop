<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | YourShop</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
    <div class="side-logo-container" style="text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px;">
        <div class="side-logo" style="font-size: 1.6rem; font-weight: 700; color: #4834d4;">
            Your<span style="color: #686de0;">Shop</span>
        </div>
        <div id="globalShopName" style="font-size: 0.8rem; color: #636e72; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;">
            Loading Shop...
        </div>
    </div>
    
    <nav>
        <a href="admin_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="inventory.html"><i class="fas fa-box"></i> Inventory</a>
        <a href="transactions.html"><i class="fas fa-shopping-cart"></i> Transactions</a>
        <a href="staff_management.html"><i class="fas fa-users"></i> Staff Management</a>
        <a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <a href="billing.html"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
        <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</aside>


        <main class="main-content">
            <div style="margin-bottom: 20px;">
                <a href="admin_dashboard.html" style="text-decoration: none; color: #636e72; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.3s;" onmouseover="this.style.color='#4834d4'" onmouseout="this.style.color='#636e72'">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>

            <div class="glass-card-profile" style="max-width: 800px;"> 
                <div class="profile-header">
                    <div class="avatar-large"><i class="fas fa-store"></i></div>
                    <h2>Profile & Shop Settings</h2>
                    <p style="color: #636e72; font-size: 0.9rem;">Manage your business details for billing</p>
                </div>

                <form class="profile-form" id="adminProfileForm">
                    
                    <div style="margin-bottom: 25px;">
                        <p style="font-weight: 600; color: #4834d4; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px;">Basic Information</p>
                        <div class="input-row-zen" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="input-group-zen">
                                <label>Owner Name</label>
                                <input type="text" id="adminFullName" placeholder="Full Name">
                            </div>
                            <div class="input-group-zen">
                                <label>Shop Name</label>
                                <input type="text" id="setupShopName" placeholder="e.g. YourShop Retail">
                            </div>
                        </div>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <p style="font-weight: 600; color: #4834d4; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px;">Contact & Tax Details</p>
                        
                        <div class="input-row-zen" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
                            <div class="input-group-zen">
                                <label>Shop Email (for Billing)</label>
                                <input type="email" id="setupBusinessEmail" placeholder="shop@example.com">
                            </div>
                            <div class="input-group-zen">
                                <label>Shop Phone Number</label>
                                <input type="tel" id="setupPhone" placeholder="+91 98765-43210">
                            </div>
                        </div>

                        <div class="input-row-zen" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                            <div class="input-group-zen">
                                <label>GSTIN Number</label>
                                <input type="text" id="setupGSTIN" placeholder="22AAAAA0000A1Z5">
                            </div>
                            <div class="input-group-zen">
                                <label>Store Address</label>
                                <textarea id="setupAddress" placeholder="Complete store address" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); resize: none; height: 45px; font-family: inherit;"></textarea>
                            </div>
                        </div>
                    </div>

                   

                    <button type="submit" class="save-profile-btn" style="width: 100%;">
                        <i class="fas fa-save"></i> Update All Settings
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="../JS/profile_logic.js"></script>
</body>
</html>
